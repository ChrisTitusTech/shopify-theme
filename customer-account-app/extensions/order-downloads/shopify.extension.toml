api_version = "2025-10"
uid = "7f8657b7-b730-3379-790f-e3e8b236b6e46838c67e"

[[extensions]]
type = "ui_extension"
name = "Order Downloads"
handle = "order-downloads"

[[extensions.targeting]]
module = "./src/index.jsx"
target = "customer-account.order-status.cart-line-list.render-after"

# Declare the custom.url product metafield so Shopify auto-fetches it for each
# product in the order and provides it via shopify.appMetafields.
# This is the recommended approach per the Shopify extension docs — no API
# capability or query needed.
[[extensions.metafields]]
namespace = "custom"
key = "url"

# order-index.block.render is intentionally disabled:
# that target provides only StandardApi (no shopify.lines) and
# shopify.query() reaches the Storefront API which has no order
# line-item customAttributes. It requires a backend proxy to work.
# [[extensions.targeting]]
# module = "./src/order-index.jsx"
# target = "customer-account.order-index.block.render"
